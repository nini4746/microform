services:
  postgres:
    image: postgres:16-alpine
    container_name: microform-db
    environment:
      POSTGRES_DB: microform
      POSTGRES_USER: microform
      POSTGRES_PASSWORD: microform
    ports:
      - "5432:5432"
    volumes:
      - microform_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U microform"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  microform_data:
